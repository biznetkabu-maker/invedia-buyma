name: pytest

on:
  push:
    paths:
      - "lib/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - "lib/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,browser]"
      - run: pytest -q
      - name: mypy type check
        run: mypy lib/config.py lib/profit_calculator.py lib/file_lock.py lib/logging_config.py --no-error-summary || true
