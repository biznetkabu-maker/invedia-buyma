      }
      var gzip = norm(document.getElementById("gzip-code").textContent);
      var test = norm(document.getElementById("test-code").textContent);
      var ta = document.getElementById("raw");
      document.getElementById("dragLink").href = gzip;
      function status(msg, ok) {
        var s = document.getElementById("status");
        s.textContent = msg;
        s.style.color = ok ? "#15803d" : "#b91c1c";
      }
      function copy(text, msg) {
        navigator.clipboard.writeText(text).then(function () {
          status(msg + " (" + text.length + " 文字)", true);
        }).catch(function () {
          ta.value = text;
          ta.hidden = false;
          ta.select();
          status("手動で Ctrl+C", false);
        });
      }
      document.getElementById("copyGzip").onclick = function () {
        copy(gzip, "gzip URL をコピーしました");
      };
      document.getElementById("copyTest").onclick = function () {
        copy(test, "テスト URL をコピーしました");
      };
      document.getElementById("showGzip").onclick = function () {
        ta.value = gzip;
        ta.hidden = false;
        ta.select();
        status("gzip " + gzip.length + " 文字", true);
      };
    })();
  </script>
</body>
</html>
